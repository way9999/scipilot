 - name: Upload Linux release assets
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          shell: bash
          run: |
            shopt -s nullglob
            files=(release/${{ steps.version.outputs.version }}/*)
            if [ ${#files[@]} -eq 0 ]; then
              echo "No release files found under release/${{ steps.version.outputs.version }}"
              ls -R release || true
              exit 1
            fi
            gh release upload "v${{ steps.version.outputs.version }}" \
              -R "${{ github.repository }}" \
              --clobber \
              "${files[@]}"
